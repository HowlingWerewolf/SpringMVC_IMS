server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files under root and fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve static assets (images, css, js) — handled by the location / block above
    # Include standard MIME types so .js, .css etc. are served with correct Content-Type
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
}



