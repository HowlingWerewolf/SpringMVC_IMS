server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # If the app is built with base-href /SpringMVC_IMS/, strip that prefix so
    # files like /SpringMVC_IMS/main-*.js map to /usr/share/nginx/html/main-*.js
    rewrite ^/SpringMVC_IMS(/.*)$ $1 break;

    # Serve application, fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No caching for HTML and manifest files
    location ~* \.(?:manifest|appcache|html?|xml|json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Long caching for static assets
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public";
    }

    # Optional: hide nginx version
    server_tokens off;
}


