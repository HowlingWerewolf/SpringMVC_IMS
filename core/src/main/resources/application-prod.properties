# PROD environment (production) - use with -Dspring.profiles.active=prod
#
# Secrets handling: MUST use a secret manager or environment variables injected by your
# deployment pipeline. Do NOT store credentials in source control.
# Example environment variable names: PROD_DB_URL, PROD_DB_USERNAME, PROD_DB_PASSWORD

# Actuator: expose minimal endpoints in production. Consider securing with OAuth2/Basic or
# using a separate management port and network-level restrictions.
management.endpoints.web.exposure.include=health,info,metrics

server.servlet.context-path=/SpringMVC_IMS

management.health.db.enabled=true

# Database (PROD) - resolve from environment or secret store
spring.datasource.url=${PROD_DB_URL:jdbc:postgresql://prod-db-host:5432/prod_db}
spring.datasource.username=${PROD_DB_USERNAME:prod_user}
spring.datasource.password=${PROD_DB_PASSWORD:}

# Flyway
spring.flyway.url=${PROD_FLYWAY_URL:${PROD_DB_URL:jdbc:postgresql://prod-db-host:5432/prod_db}}
spring.flyway.user=${PROD_FLYWAY_USER:${PROD_DB_USERNAME:prod_user}}
spring.flyway.password=${PROD_FLYWAY_PASSWORD:${PROD_DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Production logging
logging.level.root=INFO
logging.level.com.ims=INFO

