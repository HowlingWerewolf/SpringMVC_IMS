# INT environment (integration) - use with -Dspring.profiles.active=int
#
# Secrets handling: use environment variables or spring.config.import from your secret manager
# Example environment variable names: INT_DB_URL, INT_DB_USERNAME, INT_DB_PASSWORD

# Actuator (expose limited endpoints for integration)
management.endpoints.web.exposure.include=health,info,metrics,threaddump

server.servlet.context-path=/SpringMVC_IMS

management.health.db.enabled=true

# Database (INT) - resolve from environment or secret store
spring.datasource.url=${INT_DB_URL:jdbc:postgresql://int-db-host:5432/int_db}
spring.datasource.username=${INT_DB_USERNAME:int_user}
spring.datasource.password=${INT_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Keep legacy id generator behavior consistent with previous persistence.xml
spring.jpa.properties.hibernate.id.new_generator_mappings=false

# Logging level adjustments
logging.level.root=INFO
logging.level.org.springframework=INFO

# TODO: wire secrets through CI/CD or secret manager; do not commit real credentials


