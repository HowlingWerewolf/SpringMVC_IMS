# Allow actuator endpoints
management.endpoints.web.exposure.include=*

# Serve the application under this context path when running embedded (e.g. mvn spring-boot:run)
# This makes actuator available at /SpringMVC_IMS/actuator
server.servlet.context-path=/SpringMVC_IMS
# Disable DB health indicator for local developer runs to avoid health=DOWN when DB is not available
management.health.db.enabled=false

# Database used by the application (match credentials used by Flyway in App.onStartup)
spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=example
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Prevent Hibernate from auto-updating schema at runtime (we use Flyway)
spring.jpa.hibernate.ddl-auto=none

# Optional: explicitly set dialect if JDBC metadata is not available
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Keep legacy id generator behavior consistent with previous configuration
spring.jpa.properties.hibernate.id.new_generator_mappings=false
