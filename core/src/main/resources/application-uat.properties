# UAT environment (user acceptance testing) - use with -Dspring.profiles.active=uat
#
# Secrets handling: use environment variables or spring.config.import from your secret manager
# Example environment variable names: UAT_DB_URL, UAT_DB_USERNAME, UAT_DB_PASSWORD

management.endpoints.web.exposure.include=health,info,metrics

server.servlet.context-path=/SpringMVC_IMS

management.health.db.enabled=true

# Database (UAT) - resolve from environment or secret store
spring.datasource.url=${UAT_DB_URL:jdbc:postgresql://uat-db-host:5432/uat_db}
spring.datasource.username=${UAT_DB_USERNAME:uat_user}
spring.datasource.password=${UAT_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.root=INFO
logging.level.com.ims=DEBUG

# TODO: use encrypted secrets and RBAC for access to the secret store


