spring.datasource.url=jdbc:postgresql://dev-db-host:5432/dev_db
# DEV environment (development) - use with -Dspring.profiles.active=dev or SPRING_PROFILES_ACTIVE=dev
#
# Secrets handling (recommended): do NOT commit real credentials to source control.
# Options to supply DB credentials / URLs at runtime:
# 1) Environment variables (recommended for local dev):
#    - DB_URL, DB_USERNAME, DB_PASSWORD
#    Example (PowerShell): $env:DB_USERNAME='dev_user'; $env:DB_PASSWORD='s3cr3t'; mvn -pl core spring-boot:run -Dspring-boot.run.profiles=dev
# 2) Spring Config import from a secret manager (AWS Secrets Manager / Azure Key Vault / Vault):
#    - Example for AWS Secrets Manager (requires adding the Spring Cloud AWS Secrets Manager config dependency):
#      spring.config.import=aws-secretsmanager:your-secret-id
#    - Example for Azure Key Vault (requires Spring Cloud Azure configuration):
#      spring.config.import=azure-key-vault://your-vault-name
#
# The properties below use placeholders that prefer environment variables or externally imported values.

# Actuator
management.endpoints.web.exposure.include=*

# Application context path (keep consistent with WAR context)
server.servlet.context-path=/SpringMVC_IMS

# Health checks
management.health.db.enabled=true

# Database (DEV) - values should come from environment variables or a secret provider
spring.datasource.url=${DB_URL:jdbc:postgresql://dev-db-host:5432/dev_db}
spring.datasource.username=${DB_USERNAME:dev_user}
# Intentionally no default for password; prefer environment injection or secret import
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# TODO: ensure secrets are provided by your CI/CD or secret manager in non-local environments


